<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jimboy Pacanut - Contact</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="../css/contact.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome (Updated) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- EmailJS -->
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>
        (function(){
            emailjs.init("B0uUIxmqrLtXaIdWd");
        })();
    </script>
</head>

<body>

<!-- Navigation -->
<header>
    <nav>
        <div class="logo"><span>JPixel</span></div>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="works.html">Works</a></li>
            <li><a href="contact.html" class="active">Contact</a></li>
        </ul>
    </nav>
</header>

<!-- Hero -->
<section class="contact-hero">
    <div class="hero-content">
        <h1>Get in Touch</h1>
        <p><i class="fas fa-envelope"></i> Let’s collaborate or just say hi!</p>
    </div>
</section>

<!-- Contact Form -->
<section class="contact-section">
    <h2>Contact Me</h2>

    <div class="contact-container">

        <form id="contact-form" class="modern-contact-form">
            
            <div class="form-group">
                <input type="text" id="name" name="name" placeholder="Your Name" required>
            </div>

            <div class="form-group">
                <input type="email" id="email" name="email" placeholder="Your Email" required>
            </div>

            <div class="form-group">
                <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
            </div>

            <button type="submit" id="submit-btn" class="btn">
                <i class="fas fa-paper-plane"></i> Send Message
            </button>

            <p id="status" class="status-message"></p>

        </form>

    </div>
</section>

<!-- Footer -->
<footer>
    <p>
        © 2025 Jimboy Pacanut |
        Built with <i class="fas fa-heart"></i> passion
    </p>

    <div class="social-icons">
        <a href="https://github.com/jimboypacanut" target="_blank">
            <i class="fab fa-github"></i>
        </a>

        <a href="#" target="_blank">
            <i class="fab fa-linkedin"></i>
        </a>

        <a href="mailto:pacanut.jimboy05@gmail.com">
            <i class="fas fa-envelope"></i>
        </a>

        <a href="https://wa.me/639672150147" target="_blank">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>
</footer>

<!-- Script -->
<script>
    document.getElementById("contact-form").addEventListener("submit", function(event) {
        event.preventDefault();

        const btn = document.getElementById("submit-btn");
        const status = document.getElementById("status");

        btn.innerHTML = "Sending...";
        btn.disabled = true;

        const templateParams = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            message: document.getElementById("message").value
        };

        emailjs.send("service_46zyuv2", "template_dc3lgm9", templateParams)
            .then(function(response) {
                status.innerHTML = "✅ Message sent successfully!";
                status.style.color = "green";
                document.getElementById("contact-form").reset();
            })
            .catch(function(error) {
                status.innerHTML = "❌ Failed to send message. Please try again.";
                status.style.color = "red";
            })
            .finally(function() {
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Message';
                btn.disabled = false;

                setTimeout(() => {
                    status.innerHTML = "";
                }, 4000);
            });
    });
</script>

</body>
</html>
